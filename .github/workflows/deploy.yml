name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🧱 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🔍 Check Node version
        run: node -v

      - name: 📦 Install deps
        run: npm install

      - name: ⚡ Build Vite
        run: npm run build